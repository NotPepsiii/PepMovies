
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PepMovies</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">PepMovies</div>

    <input
        type="text"
        id="searchInput"
        placeholder="Search movies and TV shows..."
    >
</header>

<section id="hero">
    <div class="hero-content">
        <h1>Discover Movies & TV Shows</h1>
        <p>Trending titles updated automatically from TMDB.</p>
    </div>
</section>

<main>

    <section>
        <h2>Trending Movies</h2>
        <div id="movies" class="grid"></div>
    </section>

    <section>
        <h2>Popular TV Shows</h2>
        <div id="tvshows" class="grid"></div>
    </section>

</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <span id="closeBtn">&times;</span>

        <img id="modalPoster">

        <div class="modalInfo">
            <h2 id="modalTitle"></h2>
            <p id="modalOverview"></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
